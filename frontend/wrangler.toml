# Cloudflare Worker (static assets) hosting the Loko ERP SPA.
# The built site lives in ./dist and is served as static assets;
# unknown routes fall back to index.html (single-page-application).
name = "loko"
compatibility_date = "2024-11-01"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Деплой запускается в Cloudflare так:
#   Build command:   npm install && npm run build      ← создаёт ./dist
#   Deploy command:  npx wrangler deploy                ← заливает ./dist
#   Root directory:  frontend
