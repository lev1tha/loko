name: Deploy frontend → Cloudflare Pages

# Автодеплой фронтенда при пуше в main (только если менялся frontend/).
on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/deploy-frontend.yml']
  workflow_dispatch: {}   # ручной запуск кнопкой в GitHub → Actions

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        # Боевой адрес API: задаётся переменной репозитория VITE_API_BASE_URL
        # (Settings → Secrets and variables → Actions → Variables),
        # иначе берётся из frontend/.env.production.
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          # Эти два значения кладёшь в GitHub → Settings → Secrets:
          #   CLOUDFLARE_API_TOKEN  — токен с правом «Cloudflare Pages: Edit»
          #   CLOUDFLARE_ACCOUNT_ID — ID аккаунта Cloudflare
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=loko-erp --commit-dirty=true
